name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show || true

      - name: Build daemon
        run: make build

      - name: Verify version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(cat VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != VERSION file ($FILE_VERSION)"
            exit 1
          fi

      - name: Package release
        run: |
          mkdir -p dist/ezmirror
          cp -r python/ templates/ web/ mirrors.json Makefile VERSION dist/ezmirror/
          cp ezmirord dist/ezmirror/
          cp setup.sh dist/ezmirror/
          cp Dockerfile docker-compose.yml docker-entrypoint.sh dist/ezmirror/
          tar -czf dist/ezmirror.tar.gz -C dist ezmirror

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ezmirror ${{ github.ref_name }}"
          body_path: docs/CHANGELOG.md
          files: dist/ezmirror.tar.gz

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
