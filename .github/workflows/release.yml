name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build C daemon
        run: make

      - name: Verify version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(cat VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != VERSION file ($FILE_VERSION)"
            exit 1
          fi

      - name: Package release
        run: |
          mkdir -p dist/ezmirror
          cp -r python/ templates/ mirrors.json Makefile VERSION dist/ezmirror/
          cp ezmirord dist/ezmirror/
          cp setup.sh dist/ezmirror/
          tar -czf dist/ezmiror.tar.gz -C dist ezmirror

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ezmirror ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          files: dist/ezmirror.tar.gz
