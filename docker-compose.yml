version: "3.9"

services:
  ezmirror:
    build: .
    container_name: ezmirror
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      EZMIRROR_LAB_NAME: "MyOrg Docker Mirror"
      EZMIRROR_DOMAIN: "mirror.example.com"
      EZMIRROR_LOCATION: "Docker, US"
      EZMIRROR_GH_USER: "netplayz"
      # Comma-separated slugs to mirror (empty = all in mirrors.json)
      EZMIRROR_MIRRORS: ""
      # Storage path inside container (bind mount below)
      EZMIRROR_VOLUME: "/var/www/html"
    volumes:
      # Persistent mirror data
      - ezmirror_data:/var/www/html
      # Optional: override config
      # - ./ezmirror-config:/etc/ezmirror
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9633/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ezmirror_data:
